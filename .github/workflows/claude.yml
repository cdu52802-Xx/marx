name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        # Pin 到 v1.0.99（last-good）—— v1.0.100+ 在 claude.ai 不可达环境会
        # install.sh 静默失败 + SDK 报 "native binary not found"。
        # 上游 issue: anthropics/claude-code-action#1242（open）
        uses: anthropics/claude-code-action@v1.0.99
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          # 可选项（默认值已经够用，需要时再启用）：
          # trigger_phrase: "/claude"          # 改触发词
          # claude_args: |
          #   --model claude-sonnet-4-6
          #   --max-turns 10
